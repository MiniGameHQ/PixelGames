<!DOCTYPE html>
<html>
<head>

<title>MiniGameHQ Snake</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
background:#0b3d0b;
color:white;
text-align:center;
font-family:Arial;
margin:0;
padding-top:10px;
}

h1{
margin:5px;
}

canvas{
background:#3f9b3f;
border:3px solid white;
display:block;
margin:auto;
}

.gameArea{
width:300px;
margin:auto;
}

.info{
font-size:18px;
}

.controls{
width:230px;
margin:15px auto;
}

.controls button{
width:65px;
height:65px;
font-size:28px;
border-radius:15px;
border:none;
margin:5px;
}

.middle{
display:flex;
justify-content:space-between;
}

.buttons button{
font-size:18px;
padding:10px 15px;
border-radius:12px;
border:none;
margin:5px;
}

#gameOver{
display:none;
background:#222;
width:260px;
margin:15px auto;
padding:15px;
border-radius:15px;
}

</style>

</head>


<body>


<h1>🐍 MiniGameHQ Snake</h1>


<div class="info">

<p>Score: <span id="score">0</span></p>

<p>🏆 High Score: <span id="high">0</span></p>

</div>


<div class="gameArea">

<canvas id="game" width="300" height="300"></canvas>

</div>


<div class="controls">

<button onclick="move(0,-1)">⬆️</button>


<div class="middle">

<button onclick="move(-1,0)">⬅️</button>

<button onclick="move(1,0)">➡️</button>

</div>


<button onclick="move(0,1)">⬇️</button>

</div>
<div class="buttons">

<button onclick="pauseGame()">⏸️ Pause</button>

<button onclick="restart()">🔄 Restart</button>

</div>


<div id="gameOver">

<h2>💀 Game Over</h2>

<p>Score: <span id="finalScore">0</span></p>

<button onclick="restart()">Play Again</button>

</div>



<script>


const canvas=document.getElementById("game");

const ctx=canvas.getContext("2d");


const size=10;

const tiles=30;


let snake;

let food;

let dx;

let dy;

let score=0;

let high=Number(localStorage.getItem("snakeHigh"))||0;


let paused=false;

let dead=false;


document.getElementById("high").innerHTML=high;



function playAppleSound(){

let audio=new AudioContext();

let oscillator=audio.createOscillator();

let gain=audio.createGain();


oscillator.type="sine";

oscillator.frequency.value=700;

gain.gain.value=0.1;


oscillator.connect(gain);

gain.connect(audio.destination);


oscillator.start();

oscillator.stop(audio.currentTime+0.1);

}



function start(){

snake=[

{x:15,y:15},

{x:14,y:15},

{x:13,y:15}

];


food=randomFood();


dx=1;

dy=0;


score=0;

paused=false;

dead=false;


document.getElementById("score").innerHTML=0;

document.getElementById("gameOver").style.display="none";

}



function randomFood(){

return{

x:Math.floor(Math.random()*tiles),

y:Math.floor(Math.random()*tiles)

};

}



function move(x,y){

if(!dead && (x!==-dx || y!==-dy)){

dx=x;

dy=y;

}

}



function pauseGame(){

paused=!paused;

}



function restart(){

start();

}



function draw(){

ctx.clearRect(0,0,300,300);


ctx.strokeStyle="rgba(255,255,255,0.15)";


for(let i=0;i<=300;i+=10){

ctx.beginPath();

ctx.moveTo(i,0);

ctx.lineTo(i,300);

ctx.stroke();


ctx.beginPath();

ctx.moveTo(0,i);

ctx.lineTo(300,i);

ctx.stroke();

}



ctx.font="14px Arial";

ctx.fillText(
"🍎",
food.x*size,
food.y*size+10
);



snake.forEach((part)=>{


ctx.fillStyle="#00ff00";


ctx.fillRect(

part.x*size,

part.y*size,

size,

size

);


});



ctx.fillStyle="black";


ctx.fillRect(
snake[0].x*size+2,
snake[0].y*size+2,
2,
2
);


ctx.fillRect(
snake[0].x*size+6,
snake[0].y*size+2,
2,
2
);


}
 function game(){


if(paused || dead){

return;

}


let head={

x:snake[0].x+dx,

y:snake[0].y+dy

};



if(

head.x<0 ||

head.x>=tiles ||

head.y<0 ||

head.y>=tiles ||

snake.some(p=>p.x===head.x && p.y===head.y)

){

endGame();

return;

}



snake.unshift(head);



if(

head.x===food.x &&

head.y===food.y

){


playAppleSound();


score++;


document.getElementById("score").innerHTML=score;


food=randomFood();


}

else{

snake.pop();

}


draw();


}



function endGame(){


dead=true;


if(score>high){

high=score;

localStorage.setItem("snakeHigh",high);

}


document.getElementById("high").innerHTML=high;

document.getElementById("finalScore").innerHTML=score;


document.getElementById("gameOver").style.display="block";


}



function loop(){

game();

setTimeout(loop,100);

}



start();

draw();

loop();


</script>


</body>

</html>
