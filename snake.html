<!DOCTYPE html>
<html>
<head>
<title>Snake - GameHub</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    background:#0b3d0b;
    color:white;
    text-align:center;
    font-family:Arial;
}

canvas {
    background:#3f9b3f;
    border:3px solid white;
    display:block;
    margin:10px auto;
    max-width:90vw;
}

button {
    font-size:22px;
    padding:12px 18px;
    border-radius:12px;
    border:none;
    margin:5px;
}

.controls {
    width:230px;
    margin:5px auto;
}

.middle {
    display:flex;
    justify-content:space-between;
}

.controls button {
    width:65px;
    height:65px;
    font-size:30px;
}

#gameOver {
    display:none;
    background:#222;
    padding:20px;
    border-radius:15px;
    width:260px;
    margin:15px auto;
}

#paused {
    display:none;
    font-size:22px;
}
</style>

</head>

<body>

<h1>🐍 Snake</h1>

<p>Score: <span id="score">0</span></p>
<p>🏆 High Score: <span id="highscore">0</span></p>

<canvas id="game" width="300" height="300"></canvas>

<div id="paused">⏸️ Paused</div>

<div id="gameOver">

<h2>💀 Game Over</h2>

<p>Score: <span id="finalScore">0</span></p>
<p>🏆 Best: <span id="finalHigh">0</span></p>

<button onclick="restart()">🔄 Play Again</button>

<br>

<a href="index.html">
<button>🏠 GameHub</button>
</a>

</div>


<div class="controls">

<button onclick="move(0,-1)">⬆️</button>

<div class="middle">
<button onclick="move(-1,0)">⬅️</button>
<button onclick="move(1,0)">➡️</button>
</div>

<button onclick="move(0,1)">⬇️</button>

</div>


<button onclick="pauseGame()">⏸️ Pause</button>
<button onclick="restart()">🔄 Restart</button>


<script>

const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

const size=10;
const tiles=30;

let snake;
let food;
let dx;
let dy;
let score;

let paused=false;
let dead=false;

let sparkle=0;

let highScore=Number(localStorage.getItem("snakeHighScore")) || 0;

document.getElementById("highscore").innerHTML=highScore;


function start(){

snake=[
{x:15,y:15},
{x:14,y:15},
{x:13,y:15}
];

food=randomFood();

dx=1;
dy=0;

score=0;

paused=false;
dead=false;

document.getElementById("score").innerHTML=0;
document.getElementById("gameOver").style.display="none";
document.getElementById("paused").style.display="none";

}


function randomFood(){

return {
x:Math.floor(Math.random()*tiles),
y:Math.floor(Math.random()*tiles)
};

}


function move(x,y){

if(!dead){

dx=x;
dy=y;

}

}


function pauseGame(){

paused=!paused;

document.getElementById("paused").style.display=
paused ? "block" : "none";

}


function restart(){

start();

}


function endGame(){

dead=true;

if(score>highScore){

highScore=score;

localStorage.setItem("snakeHighScore",highScore);

}

document.getElementById("finalScore").innerHTML=score;
document.getElementById("finalHigh").innerHTML=highScore;
document.getElementById("highscore").innerHTML=highScore;

document.getElementById("gameOver").style.display="block";

}



function draw(){

ctx.clearRect(0,0,300,300);


// grass grid

ctx.strokeStyle="rgba(255,255,255,0.15)";

for(let i=0;i<=300;i+=10){

ctx.beginPath();
ctx.moveTo(i,0);
ctx.lineTo(i,300);
ctx.stroke();

ctx.beginPath();
ctx.moveTo(0,i);
ctx.lineTo(300,i);
ctx.stroke();

}


// apple

ctx.font="12px Arial";

ctx.fillText("🍎",food.x*size,food.y*size+10);


// snake

snake.forEach((part,index)=>{

ctx.fillStyle=index===0 ? "#00ff00" : "#00c900";

ctx.fillRect(
part.x*size,
part.y*size,
size,
size
);

});


// snake face

let head=snake[0];

ctx.fillStyle="black";

ctx.fillRect(head.x*size+2,head.y*size+2,2,2);
ctx.fillRect(head.x*size+6,head.y*size+2,2,2);


// sparkle effect

if(sparkle>0){

ctx.font="20px Arial";
ctx.fillText("✨",food.x*size-5,food.y*size);

sparkle--;

}

}



function game(){

if(paused || dead){
return;
}


let head={
x:snake[0].x+dx,
y:snake[0].y+dy
};


if(
head.x<0 ||
head.x>=tiles ||
head.y<0 ||
head.y>=tiles ||
snake.some(part=>part.x===head.x && part.y===head.y)
){

endGame();
return;

}


snake.unshift(head);


if(head.x===food.x && head.y===food.y){

score++;

document.getElementById("score").innerHTML=score;

sparkle=5;

food=randomFood();

}else{

snake.pop();

}


draw();

}


start();

setInterval(game,100);

draw();

</script>

</body>
</html>
