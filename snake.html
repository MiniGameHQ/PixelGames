<!DOCTYPE html>
<html>
<head>
<title>Snake - GameHub</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    background:#111;
    color:white;
    text-align:center;
    font-family:Arial;
}

canvas {
    background:#222;
    border:3px solid white;
    display:block;
    margin:20px auto;
}

button {
    font-size:22px;
    padding:12px 18px;
    border-radius:12px;
    border:none;
    margin:5px;
}

.controls {
    width:230px;
    margin:auto;
}

.middle {
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.controls button {
    width:65px;
    height:65px;
    padding:0;
    font-size:30px;
}

#gameOver {
    display:none;
    background:#222;
    padding:20px;
    border-radius:15px;
    width:260px;
    margin:20px auto;
}

</style>

</head>

<body>

<h1>🐍 Snake</h1>

<p>Score: <span id="score">0</span></p>
<p>🏆 High Score: <span id="highscore">0</span></p>

<canvas id="game" width="300" height="300"></canvas>


<div id="gameOver">
<h2>💀 Game Over</h2>
<p>Score: <span id="finalScore">0</span></p>
<p>🏆 Best: <span id="finalHigh">0</span></p>

<button onclick="restart()">🔄 Play Again</button>

<br>

<a href="index.html">
<button>🏠 GameHub</button>
</a>

</div>


<div class="controls">

<div>
<button onclick="move(0,-1)">⬆️</button>
</div>

<div class="middle">
<button onclick="move(-1,0)">⬅️</button>

<button onclick="move(1,0)">➡️</button>
</div>

<div>
<button onclick="move(0,1)">⬇️</button>
</div>

</div>


<br>

<button onclick="pauseGame()">⏸️ Pause</button>

<button onclick="restart()">🔄 Restart</button>


<script>

const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

let size=10;
let tiles=30;

let snake;
let food;
let dx;
let dy;
let score;

let paused=false;
let dead=false;

let highScore=Number(localStorage.getItem("snakeHighScore")) || 0;

document.getElementById("highscore").innerHTML=highScore;


function start(){

snake=[{x:15,y:15}];

food={
x:5,
y:5
};

dx=1;
dy=0;

score=0;

paused=false;
dead=false;

document.getElementById("score").innerHTML=0;

document.getElementById("gameOver").style.display="none";

}


function move(x,y){

if(!dead){
dx=x;
dy=y;
}

}


function pauseGame(){

paused=!paused;

}


function restart(){

start();

}


function endGame(){

dead=true;

if(score>highScore){

highScore=score;

localStorage.setItem("snakeHighScore",highScore);

}

document.getElementById("finalScore").innerHTML=score;

document.getElementById("finalHigh").innerHTML=highScore;

document.getElementById("highscore").innerHTML=highScore;

document.getElementById("gameOver").style.display="block";

}


function game(){

if(paused || dead){
return;
}


ctx.clearRect(0,0,300,300);


ctx.fillStyle="lime";

snake.forEach(part=>{

ctx.fillRect(
part.x*size,
part.y*size,
size,
size
);

});


ctx.fillStyle="red";

ctx.fillRect(
food.x*size,
food.y*size,
size,
size
);


let head={
x:snake[0].x+dx,
y:snake[0].y+dy
};


if(
head.x<0 ||
head.x>=tiles ||
head.y<0 ||
head.y>=tiles
){

endGame();

return;

}


snake.unshift(head);


if(head.x===food.x && head.y===food.y){

score++;

document.getElementById("score").innerHTML=score;


food={
x:Math.floor(Math.random()*tiles),
y:Math.floor(Math.random()*tiles)
};


}else{

snake.pop();

}

}


start();

setInterval(game,100);

</script>


</body>
</html>
