<!DOCTYPE html>
<html>
<head>
<title>Snake - GameHub</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    background:#111;
    color:white;
    text-align:center;
    font-family:Arial;
}

canvas {
    background:#222;
    border:3px solid white;
    display:block;
    margin:20px auto;
}

button {
    font-size:20px;
    padding:12px 18px;
    margin:5px;
    border-radius:10px;
    border:none;
}

.controls button {
    font-size:25px;
    width:60px;
    height:60px;
}

.row {
    display:flex;
    justify-content:center;
}

#gameOver {
    display:none;
}

</style>

</head>

<body>

<h1>🐍 Snake</h1>

<p>Score: <span id="score">0</span></p>
<p>🏆 High Score: <span id="highscore">0</span></p>

<canvas id="game" width="300" height="300"></canvas>

<div id="gameOver">
<h2>💀 Game Over</h2>
<button onclick="restart()">🔄 Restart</button>
</div>

<button onclick="pauseGame()">⏸️ Pause</button>

<br>

<a href="index.html">
<button>🏠 Back to GameHub</button>
</a>


<div class="controls">

<div class="row">
<button onclick="move(0,-1)">⬆️</button>
</div>

<div class="row">
<button onclick="move(-1,0)">⬅️</button>
<button onclick="move(0,1)">⬇️</button>
<button onclick="move(1,0)">➡️</button>
</div>

</div>


<script>

const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

let size=10;
let tiles=30;

let snake;
let food;
let dx;
let dy;
let score;
let highScore;

let paused=false;
let dead=false;


highScore=Number(localStorage.getItem("snakeHighScore")) || 0;
document.getElementById("highscore").innerHTML=highScore;


function start(){

snake=[{x:15,y:15}];

food={
x:5,
y:5
};

dx=1;
dy=0;

score=0;

document.getElementById("score").innerHTML=0;

paused=false;
dead=false;

document.getElementById("gameOver").style.display="none";

}


function move(x,y){

if(!dead){
dx=x;
dy=y;
}

}


function pauseGame(){

paused=!paused;

}


function restart(){

start();

}


function game(){

if(paused || dead){
return;
}


ctx.clearRect(0,0,300,300);


ctx.fillStyle="lime";

snake.forEach(part=>{
ctx.fillRect(part.x*size,part.y*size,size,size);
});


ctx.fillStyle="red";

ctx.fillRect(food.x*size,food.y*size,size,size);


let head={
x:snake[0].x+dx,
y:snake[0].y+dy
};


if(
head.x<0 ||
head.x>=tiles ||
head.y<0 ||
head.y>=tiles
){

dead=true;

document.getElementById("gameOver").style.display="block";

return;

}


snake.unshift(head);


if(head.x===food.x && head.y===food.y){

score++;

document.getElementById("score").innerHTML=score;


if(score>highScore){

highScore=score;

localStorage.setItem("snakeHighScore",highScore);

document.getElementById("highscore").innerHTML=highScore;

}


food={
x:Math.floor(Math.random()*tiles),
y:Math.floor(Math.random()*tiles)
};


}else{

snake.pop();

}

}


function loop(){
game();
}


start();

setInterval(loop,100);

</script>

</body>
</html>
