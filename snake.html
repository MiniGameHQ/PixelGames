<!DOCTYPE html>
<html>
<head>

<title>MiniGameHQ Snake</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
padding:15px;
background:#0b3d0b;
color:white;
font-family:Arial,sans-serif;
text-align:center;
touch-action:manipulation;
}

h1{
margin:5px;
}

.card{
background:#1f6b1f;
border:3px solid white;
border-radius:20px;
padding:15px;
margin:15px auto;
max-width:350px;
}


button{
background:#111;
color:white;
border:none;
border-radius:12px;
padding:12px 18px;
font-size:18px;
margin:5px;
}


canvas{

background:#55a630;
border:3px solid white;
border-radius:15px;

}



.gameBox{

position:relative;
width:300px;
margin:auto;

}



#playButton{

position:absolute;
top:50%;
left:50%;

transform:translate(-50%,-50%);

background:black;
color:white;

padding:20px 55px;

font-size:30px;
font-weight:bold;

border-radius:15px;

}



#gameOver{

display:none;

position:absolute;
top:50%;
left:50%;

transform:translate(-50%,-50%);

background:black;

padding:25px;

border-radius:20px;

width:240px;

}



.controls button{

width:65px;
height:65px;
font-size:25px;

}


.row{

display:flex;
justify-content:center;

}



.shopItem{

background:#2e8b57;
border-radius:15px;
padding:10px;
margin:10px;

}



#xpBar{

height:20px;
background:#00ff00;
width:0%;

}


.bar{

height:20px;
background:#111;
border-radius:20px;
overflow:hidden;

}


</style>

</head>


<body>


<h1>🐍 MiniGameHQ Snake</h1>


<div class="card">

<p>🌟 Level:
<span id="level">1</span>
</p>

<p>🪙 Coins:
<span id="coins">0</span>
</p>


<button onclick="backToHub()">
🏠 Back to Game Hub
</button>


<h3>Difficulty</h3>

<button onclick="setDifficulty(160)">
🟢 Easy
</button>

<button onclick="setDifficulty(120)">
🟡 Medium
</button>

<button onclick="setDifficulty(80)">
🔴 Hard
</button>


</div>



<div class="gameBox">


<canvas id="game" width="300" height="300"></canvas>


<div id="playButton">
PLAY
</div>



<div id="gameOver">

<h2>💀 Game Over</h2>

<p>
Score:
<span id="score">0</span>
</p>


<button onclick="startGame()">
Restart
</button>


</div>


</div>





<div class="controls">

<button onclick="changeDirection(0,-1)">
⬆️
</button>


<div class="row">

<button onclick="changeDirection(-1,0)">
⬅️
</button>


<button onclick="changeDirection(1,0)">
➡️
</button>

</div>


<button onclick="changeDirection(0,1)">
⬇️
</button>


</div>


<div class="card">

<h2>🛒 Skins</h2>

<div class="shopItem">
🟢 Green
<button onclick="selectSkin('green')">Use</button>
</div>


<div class="shopItem">
🔵 Blue
<button onclick="buySkin('blue',20)">20🪙</button>
</div>


<div class="shopItem">
🟡 Gold
<button onclick="buySkin('gold',50)">50🪙</button>
</div>


</div>


<div class="card">

<h2>🌟 XP</h2>

<p>
<span id="xp">0</span>/<span id="need">100</span>
</p>


<div class="bar">

<div id="xpBar"></div>

</div>


</div>


<script>
  <script>

const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");


const size=10;
const tiles=30;


let snake=[];
let apple={x:10,y:10};


let direction={x:1,y:0};
let nextDirection={x:1,y:0};


let playing=false;
let paused=false;


let score=0;


let coins=Number(localStorage.getItem("coins"))||0;

let skin=localStorage.getItem("skin")||"green";


let level=Number(localStorage.getItem("level"))||1;

let xp=Number(localStorage.getItem("xp"))||0;


let speed=120;



document.getElementById("coins").innerHTML=coins;
document.getElementById("level").innerHTML=level;




function startGame(){


document.getElementById("playButton").style.display="none";
document.getElementById("gameOver").style.display="none";


snake=[
{x:15,y:15},
{x:14,y:15},
{x:13,y:15}
];


direction={x:1,y:0};
nextDirection={x:1,y:0};


score=0;

playing=true;


draw();


}





document.getElementById("playButton").onclick=startGame;




function setDifficulty(value){

speed=value;

}





function changeDirection(x,y){


if(x!==-direction.x || y!==-direction.y){

nextDirection={x:x,y:y};

}

}




document.addEventListener("keydown",e=>{

if(e.key==="ArrowUp")changeDirection(0,-1);

if(e.key==="ArrowDown")changeDirection(0,1);

if(e.key==="ArrowLeft")changeDirection(-1,0);

if(e.key==="ArrowRight")changeDirection(1,0);

});







function spawnApple(){

apple={
x:Math.floor(Math.random()*28),
y:Math.floor(Math.random()*28)
};

}







function update(){


if(!playing)return;



direction=nextDirection;


let head={
x:snake[0].x+direction.x,
y:snake[0].y+direction.y
};



if(
head.x<0 ||
head.y<0 ||
head.x>=tiles ||
head.y>=tiles ||
snake.some(p=>p.x===head.x&&p.y===head.y)
){

endGame();

return;

}



snake.unshift(head);



if(
head.x>=apple.x &&
head.x<=apple.x+1 &&
head.y>=apple.y &&
head.y<=apple.y+1
){


score++;

coins++;


xp+=10;


levelCheck();


save();



spawnApple();


}

else{

snake.pop();

}


draw();


}







function levelCheck(){


if(xp>=level*100){

xp=0;

level++;

coins+=25;

}


document.getElementById("level").innerHTML=level;


document.getElementById("xp").innerHTML=xp;


document.getElementById("need").innerHTML=level*100;


document.getElementById("xpBar").style.width=
(xp/(level*100)*100)+"%";


}






function draw(){


ctx.clearRect(0,0,300,300);



snake.forEach((p,i)=>{


ctx.fillStyle=
skin==="blue"?"#008cff":
skin==="gold"?"gold":
"#00ff00";


ctx.beginPath();

ctx.roundRect(
p.x*size,
p.y*size,
size,
size,
4
);


ctx.fill();


});



ctx.font="20px Arial";

ctx.fillText(
"🍎",
apple.x*size,
apple.y*size+18
);



}



function endGame(){


playing=false;


document.getElementById("score").innerHTML=score;


document.getElementById("gameOver").style.display="block";


}







function buySkin(name,cost){


if(coins>=cost){


coins-=cost;

skin=name;


save();


document.getElementById("coins").innerHTML=coins;


}


}





function selectSkin(name){

skin=name;

save();

}





function save(){


localStorage.setItem("coins",coins);

localStorage.setItem("skin",skin);

localStorage.setItem("level",level);

localStorage.setItem("xp",xp);


}







function backToHub(){

window.location.href="index.html";

}





spawnApple();


setInterval(update,speed);



</script>

</body>
</html>
