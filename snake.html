<!DOCTYPE html>
<html>
<head>
<title>Snake - GameHub</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    background:#111;
    color:white;
    text-align:center;
    font-family:Arial;
}

canvas {
    background:#222;
    border:3px solid white;
    display:block;
    margin:20px auto;
}

.controls {
    text-align:center;
}

button {
    font-size:25px;
    width:60px;
    height:60px;
    margin:3px;
    border-radius:10px;
    border:none;
}

.row {
    display:flex;
    justify-content:center;
}
</style>

</head>

<body>

<h1>🐍 Snake</h1>

<p>
Score: <span id="score">0</span>
</p>

<p>
🏆 High Score: <span id="highscore">0</span>
</p>

<canvas id="game" width="300" height="300"></canvas>

<div class="controls">

<div class="row">
<button onclick="move(0,-1)">⬆️</button>
</div>

<div class="row">
<button onclick="move(-1,0)">⬅️</button>
<button onclick="move(0,1)">⬇️</button>
<button onclick="move(1,0)">➡️</button>
</div>

</div>


<script>

const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

let size=10;
let tiles=30;

let snake=[{x:15,y:15}];

let food={
x:5,
y:5
};

let dx=1;
let dy=0;

let score=0;

let highScore=localStorage.getItem("snakeHighScore") || 0;

document.getElementById("highscore").innerHTML=highScore;


function move(x,y){
dx=x;
dy=y;
}


function game(){

ctx.clearRect(0,0,300,300);


ctx.fillStyle="lime";

snake.forEach(part=>{
ctx.fillRect(part.x*size,part.y*size,size,size);
});


ctx.fillStyle="red";
ctx.fillRect(food.x*size,food.y*size,size,size);


let head={
x:snake[0].x+dx,
y:snake[0].y+dy
};


if(
head.x<0 ||
head.x>=tiles ||
head.y<0 ||
head.y>=tiles
){

if(score>highScore){

localStorage.setItem("snakeHighScore",score);

}

alert("Game Over! Score: "+score);
location.reload();

return;

}


snake.unshift(head);


if(head.x===food.x && head.y===food.y){

score++;

document.getElementById("score").innerHTML=score;


if(score>highScore){

highScore=score;
document.getElementById("highscore").innerHTML=highScore;

}


food={
x:Math.floor(Math.random()*tiles),
y:Math.floor(Math.random()*tiles)
};


}else{

snake.pop();

}

}


setInterval(game,100);

</script>

</body>
</html>
